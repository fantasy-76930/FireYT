name: Update Fantasy Tune daily picks

on:
  schedule:
    - cron: "10 22 * * *"
    - cron: "10 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-trending:
    runs-on: ubuntu-latest
    steps:
      - name: Check out site
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Refresh trending picks
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/update-trending.mjs

      - name: Verify 300-song rotation
        run: node scripts/verify-rotation.mjs

      - name: Commit daily update
        run: |
          if git diff --quiet -- data/auto-picks.json; then
            echo "No trending changes to publish."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/auto-picks.json
          git commit -m "Update daily Fantasy Tune picks"
          git push
