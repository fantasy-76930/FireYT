<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="FireYT 直接整理近期熱門 YouTube 音樂，打開就能一鍵播放。"
    />
    <meta name="theme-color" content="#f8fdff" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FireYT" />
    <meta property="og:url" content="https://fantasy-76930.github.io/FireYT/" />
    <meta property="og:title" content="FireYT - 你不用找，我先挑好了" />
    <meta
      property="og:description"
      content="近期熱門歌單、K-pop、華語新歌、療癒直播聲景，一鍵直接播放。"
    />
    <meta property="og:image" content="https://fantasy-76930.github.io/FireYT/assets/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FireYT - 你不用找，我先挑好了" />
    <meta
      name="twitter:description"
      content="近期熱門歌單、K-pop、華語新歌、療癒直播聲景，一鍵直接播放。"
    />
    <meta name="twitter:image" content="https://fantasy-76930.github.io/FireYT/assets/og-image.png" />
    <title>FireYT - 你不用找，我先挑好了</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/favicon.ico" sizes="any" />
    <link rel="icon" href="./assets/favicon-32.png" type="image/png" sizes="32x32" />
    <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar" aria-label="主要導覽">
        <a class="brand" href="./" aria-label="FireYT 首頁">
          <span class="brand-mark" aria-hidden="true">
            <img src="./assets/icon-192.png" alt="" />
          </span>
          <span>FireYT</span>
        </a>
        <div class="topbar-actions">
          <div class="visitor-counter" aria-label="今日到訪與總到訪人數">
            <span>到訪</span>
            <img id="visitorBadge" alt="今日 / 總到訪" />
          </div>
          <button class="icon-button share-button" id="shareButton" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 8a3 3 0 1 0-2.8-4H15a3 3 0 0 0 .4 1.5L8.9 9.1a3 3 0 1 0 0 5.8l6.5 3.6A3 3 0 1 0 16.2 17l-6.5-3.6a3.1 3.1 0 0 0 0-2.8L16.2 7a3 3 0 0 0 1.8 1Zm0-6a1 1 0 1 1 0 2 1 1 0 0 1 0-2ZM6 13a1 1 0 1 1 0-2 1 1 0 0 1 0 2Zm12 7a1 1 0 1 1 0-2 1 1 0 0 1 0 2Z"></path>
            </svg>
            <span id="shareButtonLabel">分享</span>
          </button>
          <button class="icon-button" id="installButton" type="button" hidden>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3v12"></path>
              <path d="m7 10 5 5 5-5"></path>
              <path d="M5 21h14"></path>
            </svg>
            <span>安裝</span>
          </button>
        </div>
      </header>

      <main>
        <section class="hero" aria-labelledby="pageTitle">
          <div class="hero-visual" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="hero-copy">
            <p class="eyebrow" id="updateLabel">更新 2026.07.08 · Taiwan first</p>
            <h1 id="pageTitle">
              <span>你不用找</span>
              <span>我先挑好了</span>
            </h1>
            <p class="intro">
              打開就播今天台灣 YouTube 音樂趨勢，聽膩了再切 K-pop、華語新歌、夜晚、開車。
            </p>
            <div class="signal-row" aria-label="推薦狀態">
              <span>
                <strong id="signalCount">6</strong>
                首歌
              </span>
              <span>
                <strong id="signalSource">TW</strong>
                趨勢
              </span>
              <span>
                <strong id="signalMode">LIVE</strong>
                推薦
              </span>
            </div>
            <div class="hero-actions">
              <a class="primary-action" id="heroPlay" target="_blank" rel="noreferrer">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M8 5v14l11-7Z"></path>
                </svg>
                直接播放
              </a>
              <a class="secondary-action" href="#packs">換一包</a>
            </div>
          </div>

          <article class="now-card" aria-labelledby="nowTitle">
            <div class="now-media">
              <img id="featuredImage" alt="" />
              <div class="equalizer" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
              </div>
            </div>
            <div class="now-card-body">
              <p class="now-label">現在先播</p>
              <h2 id="nowTitle"></h2>
              <p id="nowMeta"></p>
              <div class="mini-list" id="miniList"></div>
            </div>
          </article>
        </section>

        <section class="ticker-strip" aria-label="今日音樂趨勢">
          <div class="ticker-window">
            <div class="ticker-track" id="tickerTrack"></div>
          </div>
        </section>

        <section class="ambient-section" aria-labelledby="ambientTitle">
          <div class="ambient-stage">
            <div>
              <p class="eyebrow">Healing live room</p>
              <h2 id="ambientTitle">療癒直播中的陪伴感</h2>
              <p>
                熱鬧市集、夜市叫賣、計程車窗外、城市移動聲。想放空時不一定要聽歌，也可以開一個有人間煙火的背景。
              </p>
            </div>
            <a class="primary-action ambient-play" id="ambientPlayAll" target="_blank" rel="noreferrer">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 5v14l11-7Z"></path>
              </svg>
              開市集聲
            </a>
          </div>
          <div class="ambient-grid" id="ambientGrid"></div>
        </section>

        <section class="pack-section" id="packs" aria-labelledby="packTitle">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Pick a mood</p>
              <h2 id="packTitle">一鍵歌包</h2>
            </div>
            <a class="text-link" href="https://kworb.net/youtube/trending/tw.html" target="_blank" rel="noreferrer">
              趨勢來源
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M7 17 17 7"></path>
                <path d="M8 7h9v9"></path>
              </svg>
            </a>
          </div>
          <div class="pack-grid" id="packGrid"></div>
        </section>

        <section class="song-section" aria-labelledby="songTitle">
          <div class="section-heading">
            <div>
              <p class="eyebrow" id="songEyebrow"></p>
              <h2 id="songTitle"></h2>
            </div>
            <a class="text-link" id="playAll" target="_blank" rel="noreferrer">
              播放整包
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M7 17 17 7"></path>
                <path d="M8 7h9v9"></path>
              </svg>
            </a>
          </div>
          <div class="song-grid" id="songGrid"></div>
        </section>

        <section class="search-section" aria-labelledby="searchTitle">
          <div>
            <p class="eyebrow">Still curious</p>
            <h2 id="searchTitle">想換口味再找</h2>
          </div>
          <form class="search-panel" id="searchForm">
            <label for="searchInput">關鍵字</label>
            <div class="search-row">
              <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m21 21-4.3-4.3"></path>
                <circle cx="11" cy="11" r="7"></circle>
              </svg>
              <input
                id="searchInput"
                name="q"
                type="search"
                autocomplete="off"
                placeholder="例如：失戀、開車、台語、K-pop"
              />
              <button type="submit">找歌</button>
            </div>
          </form>
          <div class="result-grid" id="resultGrid"></div>
        </section>
      </main>
    </div>

    <script src="./app.js" type="module"></script>
  </body>
</html>
